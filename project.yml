name: BackFlow
options:
  bundleIdPrefix: com.albgra
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  
settings:
  PRODUCT_NAME: BackFlow
  MARKETING_VERSION: 1.0.0
  CURRENT_PROJECT_VERSION: 1
  SWIFT_VERSION: 5.9
  TARGETED_DEVICE_FAMILY: 1
  SUPPORTS_MACCATALYST: false
  IPHONEOS_DEPLOYMENT_TARGET: 17.0

targets:
  BackFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    
    sources:
      - path: BackFlow
        excludes:
          - "*.xcassets"
    
    resources:
      - path: BackFlow/SeedData
        type: folder
      - path: BackFlow/Assets.xcassets
    
    info:
      path: Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: BackFlow
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSUserNotificationsUsageDescription: "BackFlow sends daily reminders for your rehab sessions and next-day check-ins to help you stay on track."
        NSHealthShareUsageDescription: "BackFlow can import your walking data from Health to automatically track your activity progress."
        NSHealthUpdateUsageDescription: "BackFlow can save your session data to Health."
        CFBundleURLTypes:
          - CFBundleURLSchemes: [backflow]
            CFBundleURLName: com.backflow.app
    
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.albgra.BackFlow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YUYU7763AG
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    
    entitlements:
      path: BackFlow.entitlements
    
schemes:
  BackFlow:
    build:
      targets:
        BackFlow: all
    run:
      config: Debug
    archive:
      config: Release
